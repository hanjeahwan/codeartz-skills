pre-commit:
  parallel: true
  jobs:
    - name: oxfmt
      glob: '*.{js,jsx,ts,tsx,mjs,cjs,json,jsonc,md,yml,yaml}'
      run: npm run format -- --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true

    - name: oxlint
      glob: '*.{js,jsx,ts,tsx,mjs,cjs,mts,cts}'
      run: npm run lint -- --fix {staged_files}
      stage_fixed: true
